# harness.yml — AI Development Harness Configuration
# Generated by: harness init

name: {{PROJECT_NAME}}
description: ""

stack: {{STACK}}
language: {{LANGUAGE}}

council:
  # Personas auto-discovered from .harness/council/*.md (excludes README + lead-architect).
  # To disable an angle, rename to <angle>.md.disabled.
  default_model: gemini-2.5-pro
  # Must stay in sync with MONTHLY_CAP in .github/workflows/council.yml.
  monthly_cap: 60
  # Hard-enforced by CALL_CAP in .harness/scripts/council.py — change the
  # value there (this is a documentation mirror only).
  per_run_cap: 20

# Build commands — used by harness recipes and CI workflow templates.
commands:
  install: {{INSTALL_CMD}}
  lint: {{LINT_CMD}}
  typecheck: {{TYPECHECK_CMD}}
  test: {{TEST_CMD}}

# Methodology
cadence: tick-tock        # tick = new feature, tock = refine/cleanup
memory: true              # persist decisions across sessions in .harness/

# Circuit breaker — pause for human approval at every council verdict.
interactive: true
