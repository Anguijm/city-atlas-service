name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # gitleaks SARIF upload

jobs:
  # ==========================================================================
  # Gitleaks secret scan — runs BEFORE anything else on every push/PR. Same
  # guard council.yml uses; mirrored here so push-to-main (which doesn't
  # trigger council) is also protected.
  # ==========================================================================
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        # Pinned to commit SHA (supply-chain guard); matches council.yml pin.
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # .env.example scrub — prevents populated secret VALUES from sneaking in.
  # Accepts placeholder/empty values and comments.
  # ==========================================================================
  env-example-scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if .env.example contains populated secrets
        run: |
          # Any line that looks like KEY=value where value is non-trivial
          # (not empty, not placeholder text). Matches real tokens accidentally
          # committed. Comments and empty assignments are fine.
          if grep -qE '^[A-Z_][A-Z0-9_]*=([A-Za-z0-9+/]{20,}|sk-[A-Za-z0-9_-]{10,}|AIza[A-Za-z0-9_-]{20,})' .env.example; then
            echo "::error::.env.example contains what looks like a populated secret. Keep values empty (KEY=)."
            exit 1
          fi

  # ==========================================================================
  # Validate — npm ci (deterministic), npm audit (prod), lint, typecheck,
  # vitest. Activates as source lands; degrades gracefully when empty.
  # ==========================================================================
  validate:
    runs-on: ubuntu-latest
    needs: [secret-scan, env-example-scrub]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Deterministic install from lockfile — no package.json-only inference.
      - name: npm ci
        run: npm ci

      # Prod-dep vulnerability gate. Dev deps are typecheck/lint tooling we
      # patch on a slower cadence; we don't want dev-only advisories to block
      # a data pipeline merge.
      - name: npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      # Lint — degrades gracefully while src/ is empty.
      - name: Lint
        run: |
          if find src -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.cjs' -o -name '*.mjs' \) -print -quit 2>/dev/null | grep -q .; then
            npx eslint --max-warnings 0 "src/**/*.{ts,tsx,js,cjs,mjs}"
          else
            echo "No lintable source yet — skipping lint. Re-enable when src/ is populated."
          fi

      # Typecheck — degrades gracefully while tsconfig.json is absent.
      - name: Typecheck
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json yet — skipping typecheck. Re-enable when TS is wired."
          fi

      # Vitest — degrades gracefully while src/ has no tests.
      - name: Vitest
        run: |
          if find src -name '*.test.ts' -print -quit 2>/dev/null | grep -q .; then
            npx vitest run
          else
            echo "No test files yet — skipping vitest. Re-enable when src/ has tests."
          fi

  # ==========================================================================
  # Python council-script sanity. Ensures .harness/scripts/council.py imports
  # cleanly with its pinned requirements. Runs in parallel with validate.
  # ==========================================================================
  council-script-check:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip install council deps
        run: pip install --quiet -r .harness/scripts/requirements.txt
      - name: council.py imports cleanly
        run: |
          python3 -c "
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location('c', pathlib.Path('.harness/scripts/council.py'))
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          print('council.py loaded OK')
          "
