name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ==========================================================================
  # .env.example scrub — prevents real secret VALUES from sneaking in via the
  # example file. Accepts placeholder/empty values.
  # ==========================================================================
  env-example-scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if .env.example contains populated secrets
        run: |
          # Any line that looks like KEY=value where value is non-trivial
          # (not empty, not placeholder text). Matches real tokens accidentally
          # committed. Comments and empty assignments are fine.
          if grep -qE '^[A-Z_][A-Z0-9_]*=([A-Za-z0-9+/]{20,}|sk-[A-Za-z0-9_-]{10,}|AIza[A-Za-z0-9_-]{20,})' .env.example; then
            echo "::error::.env.example contains what looks like a populated secret. Keep values empty (KEY=)."
            exit 1
          fi

  # ==========================================================================
  # Repo scaffolding sanity. Until pipeline code lands (separate PRs under
  # council review), CI just verifies npm install succeeds + council.py
  # imports cleanly. Test + lint jobs activate as their inputs arrive.
  # ==========================================================================
  scaffold-check:
    runs-on: ubuntu-latest
    needs: [env-example-scrub]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: npm install (no lockfile yet — allow)
        run: npm install --no-audit --no-fund

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip install council deps
        run: pip install --quiet -r .harness/scripts/requirements.txt
      - name: council.py imports cleanly
        run: python3 -c "import importlib.util, pathlib; spec=importlib.util.spec_from_file_location('c', pathlib.Path('.harness/scripts/council.py')); m=importlib.util.module_from_spec(spec); spec.loader.exec_module(m); print('council.py loaded OK')"

      # Vitest job sleeps until a real test file exists. It will be wired up
      # as part of the first PR that ports pipeline code (council-reviewed).
      - name: Vitest (run only if tests exist)
        run: |
          if find src -name '*.test.ts' -print -quit 2>/dev/null | grep -q .; then
            npx vitest run
          else
            echo "No test files yet — skipping vitest. Re-enable when src/ has tests."
          fi
