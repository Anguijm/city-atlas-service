name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read      # gitleaks-action lists PR commits to scan
  security-events: write   # gitleaks SARIF upload

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  env-example-scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if .env.example contains populated secrets
        run: |
          if grep -qE '^[A-Z_][A-Z0-9_]*=([A-Za-z0-9+/]{20,}|sk-[A-Za-z0-9_-]{10,}|AIza[A-Za-z0-9_-]{20,})' .env.example; then
            echo "::error::.env.example contains what looks like a populated secret. Keep values empty (KEY=)."
            exit 1
          fi

  validate:
    runs-on: ubuntu-latest
    needs: [secret-scan, env-example-scrub]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

  city-cache-validate:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate global_city_cache.json schema
        run: |
          python3 - <<'EOF'
          import json, sys

          REQUIRED = ["id", "name", "clinicalName", "vernacularName", "country", "region",
                      "lat", "lng", "tier", "vibeClass", "noiseBaseline",
                      "isArchived", "loreAnchor", "qualityStatus",
                      "coverageTier", "maxRadiusKm"]
          VIBE_CLASSES    = {"BRUTAL_GRIT", "DECAY_CHIC", "FLUID_TROPIC", "NEON_GRID"}
          COVERAGE_TIERS  = {"metro", "town", "village"}
          QUALITY_STATUSES = {"pending_review", "approved", "archived"}
          TIERS           = {"tier1", "tier2", "tier3"}

          data = json.load(open("configs/global_city_cache.json", encoding="utf-8"))
          errors = []
          seen_ids = {}
          for i, city in enumerate(data):
              cid = city.get("id", f"<entry {i}>")
              if cid in seen_ids:
                  errors.append(f"{cid}: duplicate id (also at index {seen_ids[cid]})")
              seen_ids[cid] = i
              for field in REQUIRED:
                  if field not in city:
                      errors.append(f"{cid}: missing required field '{field}'")
              if city.get("vibeClass") not in VIBE_CLASSES:
                  errors.append(f"{cid}: invalid vibeClass '{city.get('vibeClass')}'")
              if city.get("coverageTier") not in COVERAGE_TIERS:
                  errors.append(f"{cid}: invalid coverageTier '{city.get('coverageTier')}'")
              if city.get("qualityStatus") not in QUALITY_STATUSES:
                  errors.append(f"{cid}: invalid qualityStatus '{city.get('qualityStatus')}'")
              if city.get("tier") not in TIERS:
                  errors.append(f"{cid}: invalid tier '{city.get('tier')}'")
              if not isinstance(city.get("lat"), (int, float)):
                  errors.append(f"{cid}: lat must be numeric")
              if not isinstance(city.get("lng"), (int, float)):
                  errors.append(f"{cid}: lng must be numeric")
              if not isinstance(city.get("maxRadiusKm"), (int, float)):
                  errors.append(f"{cid}: maxRadiusKm must be numeric")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"OK — {len(data)} cities validated, no errors.")
          EOF

  council-script-check:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip install council deps
        run: pip install --quiet -r .harness/scripts/requirements.txt
      - name: council.py imports cleanly
        run: |
          python3 -c "
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location('c', pathlib.Path('.harness/scripts/council.py'))
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          print('council.py loaded OK')
          "
